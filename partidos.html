<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partidos - Sánchez Soccer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">SÁNCHEZ <span>SOCCER</span></div>
            <nav class="menu">
                <a href="index.html"><i>🏠</i> Inicio</a>
                <a href="equipos.html"><i>⚽</i> Equipos</a>
                <a href="partidos.html" class="active"><i>📅</i> Partidos</a>
                <a href="posiciones.html"><i>🏆</i> Posiciones</a>
                <a href="jugadores.html"><i>👥</i> Jugadores</a>
                <a href="goleo.html"><i>👟</i> Tabla de Goleo</a>
                <a href="#"><i>⚙️</i> Configuración</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="user-info"><span>Administrador</span><div class="avatar"></div></div>
            </header>

            <section class="content">
                <div class="seccion-titulo">
                    <h1>Programación de Partidos</h1>
                    <p>Asigna fechas, horarios y sedes para los próximos encuentros.</p>
                </div>

                <div class="grid-form">
                    <div class="card-formulario">
                        <h3>Nuevo Encuentro</h3>
                        <form class="admin-form">
                            <div class="form-group">
                                <label>Equipo Local</label>
                                <select><option>Seleccionar...</option><option>Real Coatzacoalcos</option></select>
                            </div>
                            <div class="form-group">
                                <label>Equipo Visitante</label>
                                <select><option>Seleccionar...</option><option>Deportivo Chávez</option></select>
                            </div>
                            <div class="form-group">
                                <label>Fecha y Hora</label>
                                <input type="datetime-local">
                            </div>
                            <div class="form-group">
                                <label>Cancha</label>
                                <input type="text" placeholder="Ej. Campo Central">
                            </div>
                            <button type="submit" class="btn-primary" style="width: 100%;">Guardar Partido</button>
                        </form>
                    </div>

                    <div class="card-lista">
                        <h3>Próximos en Agenda</h3>
                        <div class="item-partido">
                            <span class="fecha">12 May - 18:00</span>
                            <p>Real Coatza <strong>VS</strong> Dep. Chávez</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="main.js"></script>
</body>
</body>
</html>
